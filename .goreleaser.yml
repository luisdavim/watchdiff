---
# This is an example .goreleaser.yml file with some sane defaults.
# Make sure to check the documentation at http://goreleaser.com
project_name: watchdiff
version: 2
before:
  hooks:
    - go vet ./...
    - go test -v -race ./...
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...
builds:
  - env:
      - CGO_ENABLED=0
    ldflags: -s -w -extldflags "-static"
    flags:
      - -trimpath
    goos:
      - linux
      - windows
      - darwin
archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- if eq .Os "Darwin" }}macos_
      {{- else }}{{- tolower .Os }}_{{end}}
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
brews:
  - name: watchdiff
    repository:
      owner: luisdavim
      name: watchdiff
      branch: main
    directory: Formula
    description: "Watch a command and generate diffs from the output changes"
    homepage: "https://github.com/luisdavim/watchdiff"
    license: "MIT"
    download_strategy: CurlDownloadStrategy
    install: |
      bin.install "watchdiff"
    test: |
      system "#{bin}/watchdiff", "-h"
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
